[PHP]
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

[Date]
date.timezone = UTC

[xdebug]
; Set to "off" for normal dev (huge speed improvement).
; Change to "debug,develop" only when actively debugging, then restart container.
xdebug.mode=off

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; validate_timestamps=1 rechecks files every revalidate_freq seconds (fine for dev)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

[session]
session.save_handler = redis
session.save_path = "tcp://redis:6379"
