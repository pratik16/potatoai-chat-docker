services:
  edge:
    image: caddy:2-alpine
    container_name: potatoai_edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - potatoai_network
    depends_on:
      - frontend

  frontend:
    image: nginx:alpine
    container_name: potatoai_frontend
    restart: unless-stopped
    volumes:
      - ../frontend-dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - potatoai_network

  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile.production
      args:
        PHP_VERSION: 8.4
    container_name: potatoai_app
    restart: unless-stopped
    working_dir: /var/www/backend
    env_file:
      - .env.production
    volumes:
      - backend_storage:/var/www/backend/storage
      - backend_cache:/var/www/backend/bootstrap/cache
    networks:
      - potatoai_network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-nginx:
    image: nginx:alpine
    container_name: potatoai_backend_nginx
    restart: unless-stopped
    volumes:
      - ../backend/public:/var/www/backend/public:ro
      - ./nginx/backend.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - potatoai_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: potatoai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-potatoai_db}
      POSTGRES_USER: ${POSTGRES_USER:-potatoai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - potatoai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-potatoai} -d ${POSTGRES_DB:-potatoai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: potatoai_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-potatoai_db}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - potatoai_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: potatoai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - potatoai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile.production
      args:
        PHP_VERSION: 8.4
    container_name: potatoai_queue
    restart: unless-stopped
    working_dir: /var/www/backend
    env_file:
      - .env.production
    volumes:
      - backend_storage:/var/www/backend/storage
      - backend_cache:/var/www/backend/bootstrap/cache
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - potatoai_network
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile.production
      args:
        PHP_VERSION: 8.4
    container_name: potatoai_scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    env_file:
      - .env.production
    volumes:
      - backend_storage:/var/www/backend/storage
      - backend_cache:/var/www/backend/bootstrap/cache
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    networks:
      - potatoai_network
    depends_on:
      app:
        condition: service_started

  websockets:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile.production
      args:
        PHP_VERSION: 8.4
    container_name: potatoai_websockets
    restart: unless-stopped
    working_dir: /var/www/backend
    env_file:
      - .env.production
    volumes:
      - backend_storage:/var/www/backend/storage
      - backend_cache:/var/www/backend/bootstrap/cache
    command: php artisan reverb:start --host=0.0.0.0 --port=6001 --no-interaction
    networks:
      - potatoai_network
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

networks:
  potatoai_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  mongodb_data:
  mongodb_config:
  redis_data:
  backend_storage:
  backend_cache:
