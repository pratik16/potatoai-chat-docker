server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    index index.html;

    # No-cache for index.html so updates are picked up immediately
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files /index.html =404;
    }

    # Angular SPA — all routes fall back to index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /index.html;
    }

    # Hashed static assets (JS/CSS bundles) can be cached indefinitely
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    access_log /var/log/nginx/frontend_access.log;
    error_log /var/log/nginx/frontend_error.log;
}
