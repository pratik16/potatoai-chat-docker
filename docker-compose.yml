services:
  # Angular Frontend (production build served by Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: chatgpt_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chatgpt_network

  # PHP 8.4 + Laravel Application
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: 8.4
    container_name: chatgpt_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ../backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
      - COMPOSER_MEMORY_LIMIT=-1
    networks:
      - chatgpt_network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server (Laravel backend)
  nginx:
    image: nginx:alpine
    container_name: chatgpt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www/backend
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chatgpt_network
    depends_on:
      - app

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: chatgpt_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatgpt_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatgpt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB 7
  mongodb:
    image: mongo:7
    container_name: chatgpt_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-chatgpt_db}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - chatgpt_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 (Queue, Cache, Sessions)
  redis:
    image: redis:7-alpine
    container_name: chatgpt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatgpt_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Queue Worker
  queue:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: 8.4
    container_name: chatgpt_queue
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ../backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    networks:
      - chatgpt_network
    depends_on:
      - app
      - redis
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  # Laravel Scheduler
  scheduler:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: 8.4
    container_name: chatgpt_scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ../backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    networks:
      - chatgpt_network
    depends_on:
      - app
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"

  # Laravel WebSockets Server (Laravel Reverb)
  websockets:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: 8.4
    container_name: chatgpt_websockets
    restart: unless-stopped
    working_dir: /var/www/backend
    ports:
      - "6001:6001"
    volumes:
      - ../backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    networks:
      - chatgpt_network
    depends_on:
      - app
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=6001 --no-interaction

  # Mailhog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: chatgpt_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - chatgpt_network

  # pgAdmin 4 (PostgreSQL Web UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chatgpt_pgadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin
    networks:
      - chatgpt_network
    depends_on:
      - postgres

  # Mongo Express (MongoDB Web UI)
  mongo-express:
    image: mongo-express:latest
    container_name: chatgpt_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-admin}
    networks:
      - chatgpt_network
    depends_on:
      - mongodb

networks:
  chatgpt_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  mongodb_config:
  redis_data:
  vendor_data:
